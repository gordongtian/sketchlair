<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SketchLair</title>
    <!-- Apply saved theme before React mounts to prevent flash -->
    <script>
      (function () {
        var ALL_THEME_CLASSES = [
          "dark",
          "theme-bubble-pop",
          "theme-all-business",
          "theme-fireside",
          "theme-sketchlair-95",
          "theme-mainframe",
          "theme-rose-pine",
          "theme-everforest-dark",
          "theme-everforest-light",
        ];
        var VALID_THEMES = [
          "light",
          "dark",
          "bubble-pop",
          "all-business",
          "fireside",
          "sketchlair-95",
          "mainframe",
          "rose-pine",
          "everforest-dark",
          "everforest-light",
        ];
        try {
          var stored = localStorage.getItem("sl-theme");
          var theme =
            stored && VALID_THEMES.indexOf(stored) !== -1 ? stored : "light";
          var el = document.documentElement;
          for (var i = 0; i < ALL_THEME_CLASSES.length; i++) {
            el.classList.remove(ALL_THEME_CLASSES[i]);
          }
          if (theme === "dark") {
            el.classList.add("dark");
          } else if (theme !== "light") {
            el.classList.add("theme-" + theme);
          }
        } catch (e) {
          // localStorage unavailable — light theme is fine
        }
      })();
    </script>
    <meta name="description" content="Built with caffeine.ai" />
    <meta property="og:title" content="SketchLair" />
    <meta property="og:description" content="Built with caffeine.ai" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1a1a" />
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SketchLair" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <!-- General PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
