[toolchain]
moc = "1.3.0"

[canisters.payments]
main = "main.mo"

[moc]
args = [
  "--default-persistent-actors",
  "--actor-idl=system-idl",
  "--implicit-package=core",
  "-no-check-ir",
  "-E=M0236,M0235,M0223,M0237",
  "-A=M0198",
]

[dependencies]
core = "2.2.0"
caffeineai-authorization = "0.1.0"
caffeineai-object-storage = "0.1.1"
